<!DOCTYPE html>
<html lang="en">
<head>

  <link rel="stylesheet" href="../src/output.css">

<body class="bg-[#7f9578]">
  <button 
          onclick="history.back()" 
          class="absolute top-5 left-5 text-black text-lg">
          ← Back
        </button>
  <div class="min-h-screen bg-[#7f9578] flex items-center justify-center">
  <form>
    <div class="bg-[#7f9578] p-8 rounded-xl w-80">
      
  
      <label class="block mb-1">Email</label>
      <input 
        type="email" 
        class="w-full mb-4 p-3 rounded-xl bg-[#e6dcc0] outline-none"
      />
  
      <label class="block mb-1">Password</label>
      <input 
        type="password" 
        class="w-full mb-4 p-3 rounded-xl bg-[#e6dcc0] outline-none"
      />
  
      <p><button>Lupa Password</button></p>
      <p><button>Buat Password baru</button></p>
      <p><button>Belum punya akun? <a href="http://127.0.0.1:5500/Register/register.html" class="underline">Register</a></button></p>
  
      <button type="submit" class="w-full p-3 rounded-xl bg-[#9aa883] hover:bg-green-900">
        Login
      </button>

      

    </div>
  </form>
  </div>
