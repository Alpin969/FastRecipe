<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../src/output.css">
  <title>Document</title>
</head>
<body class="bg-[#d9d2b6]">
    <div class="min-h-screen bg-[#d9d2b6] flex items-center justify-center relative">

        <!-- Back Button -->
        <button 
          onclick="history.back()" 
          class="absolute top-5 left-5 text-black text-lg">
          ← Back
        </button>
      
        <!-- Card -->
        <div class="w-[400px]">
          <h1 class="text-xl text-center mb-2">
            Selamat datang di FastRecipe
          </h1>
      
          <p class="text-sm text-center mb-8">
            Buat akun barumu disini untuk melihat resep masakan yang kamu suka
          </p>
      
          <!-- Form -->
          <form>
      
            <label class="block mb-1">Username</label>
            <input 
              type="text" 
              class="w-full mb-4 p-3 rounded-xl bg-[#8fa27c] outline-none"
            />
      
            <label class="block mb-1">Email</label>
            <input 
              type="email" 
              class="w-full mb-4 p-3 rounded-xl bg-[#8fa27c] outline-none"
            />
      
            <label class="block mb-1">Password</label>
            <input 
              type="password" 
              class="w-full mb-4 p-3 rounded-xl bg-[#8fa27c] outline-none"
            />
      
            <!-- Login link -->
            <p class="mb-6">
              Sudah punya akun? 
              <a href="/FastRecipe-main/login/login.html" class="underline">Login</a>
            </p>
      
            <!-- Register button -->
            <button 
              type="submit"
              class="w-full p-3 rounded-xl bg-[#7a9275] hover:bg-[#6a8265] transition">
              Register
            </button>
      
          </form>
      
        </div>
      </div>
</body>
</html>
